version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-vidsnap}
      POSTGRES_USER: ${DB_USER:-vidsnap}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vidsnap}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vidsnap} -d ${DB_NAME:-vidsnap}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Mount media so generated clips persist across restarts
      - media_data:/app/media
      # Mount static files (or rebuild on deploy)
      - static_data:/app/staticfiles
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}

      # ---- Database: comment out the Neon block & uncomment the local block ----
      # --- Neon (external, as in .env) ---
      DB_ENGINE: ${DB_ENGINE:-django.db.backends.postgresql}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      # --- Local PostgreSQL (uncomment for local dev) ---
      # DB_ENGINE: django.db.backends.postgresql
      # DB_NAME: vidsnap
      # DB_USER: vidsnap
      # DB_PASSWORD: vidsnap
      # DB_HOST: db
      # DB_PORT: 5432

      GEMINI_API_KEY: ${GEMINI_API_KEY}
      YT_CLIPS_COOKIES_PATH: ${YT_CLIPS_COOKIES_PATH:-}
      CLIP_OUTPUT_DIR: /app/media/clips
    depends_on:
      db:
        condition: service_healthy
    # Uncomment the command below if you want to run migrations on startup:
    # command: >
    #   sh -c "python manage.py migrate --noinput &&
    #          gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"

volumes:
  postgres_data:
  media_data:
  static_data:
