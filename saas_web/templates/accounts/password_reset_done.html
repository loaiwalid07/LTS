{% extends 'base.html' %}
{% load static %}

{% block title %}Check your email — VidSnap{% endblock title %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4 py-16">
  <div class="w-full max-w-sm text-center">
    <div class="w-16 h-16 rounded-full bg-gold-50 flex items-center justify-center mx-auto mb-6">
      <svg class="w-8 h-8 text-gold-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
      </svg>
    </div>
    <h1 class="text-2xl font-display font-semibold text-luxury-900">Check your email</h1>
    <p class="mt-3 text-sm text-luxury-500 leading-relaxed">
      We've sent a password reset link to your email address. It may take a few minutes to arrive.
    </p>
    <p class="mt-6 text-sm text-luxury-400">
      <a href="{% url 'accounts:login' %}" class="text-gold-600 hover:text-gold-700 font-medium transition-colors">
        Back to sign in
      </a>
    </p>
  </div>
</div>
{% endblock content %}
