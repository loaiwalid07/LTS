{% extends 'base.html' %}
{% load static %}

{% block title %}Password reset — VidSnap{% endblock title %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4 py-16">
  <div class="w-full max-w-sm text-center">
    <div class="w-16 h-16 rounded-full bg-emerald-50 flex items-center justify-center mx-auto mb-6">
      <svg class="w-8 h-8 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 13l4 4L19 7"/>
      </svg>
    </div>
    <h1 class="text-2xl font-display font-semibold text-luxury-900">Password reset complete</h1>
    <p class="mt-3 text-sm text-luxury-500">
      Your password has been set. You can now sign in with your new password.
    </p>
    <div class="mt-8">
      <a href="{% url 'accounts:login' %}"
         class="inline-flex items-center justify-center px-6 py-3 rounded-xl bg-luxury-900 text-white text-sm font-medium hover:bg-luxury-800 transition-all shadow-sm">
        Sign in
      </a>
    </div>
  </div>
</div>
{% endblock content %}
